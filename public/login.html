<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFEF Motors — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #cce8f0;
      font-family: 'Helvetica Neue', Arial, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap { width: 340px; padding: 20px; }

    /* Logo */
    .logo { text-align: center; margin-bottom: 36px; }
    .logo-mark {
      width: 56px; height: 56px;
      border: 1px solid #00d4ff;
      box-shadow: 0 0 18px rgba(0,212,255,.45), inset 0 0 14px rgba(0,212,255,.1);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      font-size: 16px; font-weight: 900; color: #00d4ff;
      letter-spacing: -1px;
    }
    .logo-name {
      font-size: 15px; font-weight: 800; letter-spacing: 3.5px;
      text-transform: uppercase; color: #00d4ff;
      text-shadow: 0 0 14px rgba(0,212,255,.55);
    }
    .logo-sub {
      font-size: 10px; color: #3a7088; letter-spacing: 1.5px;
      text-transform: uppercase; margin-top: 5px;
    }

    /* Card */
    .card {
      background: #071620;
      border: 1px solid #1a4f66;
      border-radius: 4px;
      padding: 28px;
      box-shadow: 0 0 48px rgba(0,212,255,.07);
    }

    .error {
      background: rgba(255,58,92,.1);
      border: 1px solid rgba(255,58,92,.35);
      border-radius: 4px;
      padding: 9px 12px;
      font-size: 12px;
      color: #ff3a5c;
      margin-bottom: 18px;
      text-align: center;
      display: none;
    }
    .error.visible { display: block; }

    label {
      display: block;
      font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: #3a7088;
      margin-bottom: 6px;
    }

    input[type=password] {
      width: 100%;
      background: #020a0f;
      border: 1px solid #1a4f66;
      border-radius: 4px;
      color: #cce8f0;
      padding: 10px 12px;
      font-size: 15px;
      outline: none;
      letter-spacing: 3px;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    input[type=password]:focus {
      border-color: #00d4ff;
      box-shadow: 0 0 12px rgba(0,212,255,.22);
    }
    input[type=password]::placeholder { letter-spacing: 2px; color: #1a4f66; }

    button[type=submit] {
      width: 100%;
      margin-top: 20px;
      padding: 11px;
      background: transparent;
      border: 1px solid #00d4ff;
      border-radius: 4px;
      color: #00d4ff;
      font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0,212,255,.25);
      transition: all .15s;
      font-family: inherit;
    }
    button[type=submit]:hover {
      background: rgba(0,212,255,.1);
      box-shadow: 0 0 22px rgba(0,212,255,.42);
    }
    button[type=submit]:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-mark">SF</div>
      <div class="logo-name">SFEF Motors</div>
      <div class="logo-sub">Fleet Management System</div>
    </div>
    <div class="card">
      <div class="error" id="err">Incorrect password. Try again.</div>
      <form method="POST" action="/login">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               autofocus autocomplete="current-password" placeholder="••••••••">
        <button type="submit">Enter System</button>
      </form>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('err').classList.add('visible');
    }
  </script>
</body>
</html>
