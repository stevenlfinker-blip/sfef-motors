services:
  - type: web
    name: sfef-motors
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sfef-db
          property: connectionString
    disk:
      name: sfef-uploads
      mountPath: /opt/render/project/src/data/uploads
      sizeGB: 1

databases:
  - name: sfef-db
    databaseName: sfef_motors
    plan: free
